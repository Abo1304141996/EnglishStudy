<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英语口语陪练 · Voice Tutor</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📞</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .pulse-ring {
      animation: pulse-ring 1.8s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
    }
    @keyframes pulse-ring {
      0% { transform: scale(0.85); opacity: 0.7; }
      80%, 100% { transform: scale(1.6); opacity: 0; }
    }
    .speaking { animation: breath 1.2s ease-in-out infinite; }
    @keyframes breath {
      0%,100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(59,130,246,.5); }
      50% { transform: scale(1.04); box-shadow: 0 0 0 22px rgba(59,130,246,0); }
    }
    .dot-flash { animation: dot-flash 1.2s infinite; }
    @keyframes dot-flash { 0%,100% { opacity: .3 } 50% { opacity: 1 } }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 text-slate-100">

  <!-- 顶部导航 -->
  <nav class="px-6 py-4 flex items-center justify-between border-b border-white/10">
    <a href="index.html" class="flex items-center gap-2 text-slate-200 hover:text-white">
      <i class="fa-solid fa-arrow-left"></i>
      <span>返回</span>
    </a>
    <div class="text-sm text-slate-400">
      <i class="fa-solid fa-circle mr-1 text-[8px]" id="status-dot"></i>
      <span id="status-text">未连接</span>
    </div>
  </nav>

  <main class="max-w-3xl mx-auto px-6 py-8 flex flex-col items-center">

    <!-- 头像 & 状态 -->
    <div class="relative mt-6 mb-8">
      <div id="pulse" class="absolute inset-0 rounded-full bg-blue-500/40 pulse-ring hidden"></div>
      <div id="avatar" class="relative w-36 h-36 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-6xl shadow-2xl">
        🎙️
      </div>
    </div>

    <h1 class="text-2xl font-semibold mb-2">English Voice Tutor</h1>
    <p id="hint" class="text-slate-400 text-sm mb-8 h-5">点击"开始通话"，然后用中文或英文随意开讲</p>

    <!-- 对话字幕区 -->
    <div class="w-full bg-white/5 backdrop-blur rounded-2xl p-6 min-h-[240px] border border-white/10 mb-6">
      <div id="transcript" class="space-y-4 text-[15px] leading-relaxed">
        <div class="text-slate-500 text-center text-sm">对话内容会显示在这里</div>
      </div>
      <div id="live" class="mt-4 pt-4 border-t border-white/10 hidden">
        <div class="text-xs text-slate-500 mb-1">你正在说…</div>
        <div id="live-text" class="text-blue-300"></div>
      </div>
    </div>

    <!-- 控制按钮 -->
    <div class="flex items-center gap-6">
      <!-- 麦克风静音切换 -->
      <button id="btn-mic" disabled
        class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center text-xl transition"
        title="静音 / 取消静音（练习时关麦）">
        <i class="fa-solid fa-microphone"></i>
      </button>

      <!-- 通话主按钮 -->
      <button id="btn-call"
        class="w-20 h-20 rounded-full bg-green-500 hover:bg-green-400 flex items-center justify-center text-3xl shadow-lg shadow-green-500/30 transition">
        <i class="fa-solid fa-phone"></i>
      </button>

      <!-- 打断按钮 -->
      <button id="btn-interrupt" disabled
        class="w-14 h-14 rounded-full bg-white/10 hover:bg-white/20 disabled:opacity-40 disabled:cursor-not-allowed flex items-center justify-center text-xl transition"
        title="立即打断 AI">
        <i class="fa-solid fa-hand"></i>
      </button>
    </div>

    <div id="error" class="mt-6 text-red-400 text-sm min-h-5"></div>

  </main>

  <script>window.API_BASE = 'http://localhost:8888';</script>
  <script src="js/voice-audio.js"></script>
  <script src="js/voice-call.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);
    const transcript = $('transcript');
    const liveBox = $('live');
    const liveText = $('live-text');
    const statusDot = $('status-dot');
    const statusText = $('status-text');
    const avatar = $('avatar');
    const pulse = $('pulse');
    const btnCall = $('btn-call');
    const btnMic = $('btn-mic');
    const btnInterrupt = $('btn-interrupt');
    const errorBox = $('error');
    const hint = $('hint');

    let call = null;
    let inCall = false;
    let currentAiBubble = null;
    let currentAiSeq = null;

    function addBubble(role, text) {
      // 初次清空提示
      const placeholder = transcript.querySelector('.text-slate-500.text-center');
      if (placeholder) placeholder.remove();

      const wrap = document.createElement('div');
      wrap.className = role === 'user'
        ? 'flex justify-end'
        : 'flex justify-start';
      const bubble = document.createElement('div');
      bubble.className = role === 'user'
        ? 'max-w-[80%] bg-blue-600/80 rounded-2xl rounded-tr-sm px-4 py-2'
        : 'max-w-[80%] bg-white/10 rounded-2xl rounded-tl-sm px-4 py-2';
      bubble.textContent = text;
      wrap.appendChild(bubble);
      transcript.appendChild(wrap);
      transcript.parentElement.scrollTop = transcript.parentElement.scrollHeight;
      return bubble;
    }

    function setStatus(s) {
      const map = {
        connecting: ['连接中…', 'text-yellow-400'],
        connected:  ['已连接', 'text-green-400'],
        ready:      ['已就绪', 'text-green-400'],
        ended:      ['已结束', 'text-slate-500'],
      };
      const [txt, cls] = map[s] || ['未连接', 'text-slate-500'];
      statusText.textContent = txt;
      statusDot.className = 'fa-solid fa-circle mr-1 text-[8px] ' + cls;
    }

    function resetUI() {
      transcript.innerHTML = '<div class="text-slate-500 text-center text-sm">对话内容会显示在这里</div>';
      liveBox.classList.add('hidden');
      errorBox.textContent = '';
      currentAiBubble = null;
      currentAiSeq = null;
    }

    async function startCall() {
      resetUI();
      errorBox.textContent = '';
      call = new VoiceCall();
      call
        .on('status', setStatus)
        .on('asrPartial', (t) => {
          liveBox.classList.remove('hidden');
          liveText.textContent = t;
        })
        .on('asrFinal', (t) => {
          liveBox.classList.add('hidden');
          liveText.textContent = '';
          if (t && t.trim()) addBubble('user', t);
        })
        .on('aiDelta', ({ seq, text, reset }) => {
          if (reset || seq !== currentAiSeq) {
            currentAiSeq = seq;
            currentAiBubble = addBubble('ai', '');
          }
          if (text) currentAiBubble.textContent += text;
        })
        .on('aiSpeakText', () => {
          avatar.classList.add('speaking');
          pulse.classList.remove('hidden');
        })
        .on('error', (m) => { errorBox.textContent = m; });

      try {
        await call.start();
      } catch (e) {
        errorBox.textContent = e.message || String(e);
        return;
      }

      inCall = true;
      btnCall.classList.remove('bg-green-500', 'hover:bg-green-400', 'shadow-green-500/30');
      btnCall.classList.add('bg-red-500', 'hover:bg-red-400', 'shadow-red-500/30');
      btnCall.innerHTML = '<i class="fa-solid fa-phone-slash"></i>';
      btnMic.disabled = false;
      btnInterrupt.disabled = false;
      hint.textContent = '通话中，说话即可。再次点击红色按钮结束通话。';
    }

    async function endCall() {
      if (call) await call.stop();
      call = null;
      inCall = false;
      btnCall.classList.remove('bg-red-500', 'hover:bg-red-400', 'shadow-red-500/30');
      btnCall.classList.add('bg-green-500', 'hover:bg-green-400', 'shadow-green-500/30');
      btnCall.innerHTML = '<i class="fa-solid fa-phone"></i>';
      btnMic.disabled = true;
      btnInterrupt.disabled = true;
      btnMic.classList.remove('bg-red-500/60');
      btnMic.innerHTML = '<i class="fa-solid fa-microphone"></i>';
      avatar.classList.remove('speaking');
      pulse.classList.add('hidden');
      hint.textContent = '通话已结束，点击"开始通话"再试一次。';
    }

    btnCall.addEventListener('click', () => inCall ? endCall() : startCall());
    btnMic.addEventListener('click', () => {
      if (!call) return;
      const next = !call.muted;
      call.setMuted(next);
      if (next) {
        btnMic.classList.add('bg-red-500/60');
        btnMic.innerHTML = '<i class="fa-solid fa-microphone-slash"></i>';
        hint.textContent = '麦克风已关闭，练习讲话吧，我不会录入。';
      } else {
        btnMic.classList.remove('bg-red-500/60');
        btnMic.innerHTML = '<i class="fa-solid fa-microphone"></i>';
        hint.textContent = '通话中，说话即可。';
      }
    });
    btnInterrupt.addEventListener('click', () => {
      if (call) call.interrupt();
      avatar.classList.remove('speaking');
      pulse.classList.add('hidden');
    });

    // TTS 播放结束时复位头像
    setInterval(() => {
      if (call && call.player && !call.player.playing) {
        avatar.classList.remove('speaking');
        pulse.classList.add('hidden');
      }
    }, 400);

    window.addEventListener('beforeunload', () => call && call.stop());
  </script>
</body>
</html>
